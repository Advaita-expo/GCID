{% extends 'base.html' %}

{% block content %}
<div class="glass-card p-6 max-w-3xl mx-auto">
  <h3 class="text-2xl font-semibold neon-red">WW3 Risk Dashboard</h3>
  <div class="mt-4 flex items-center justify-between">
    <div style="width:320px;">
      <canvas id="riskGauge" height="240"></canvas>
    </div>
    <div class="pl-6">
      <div class="text-sm text-gray-300">Risk Score</div>
      <div id="risk-score" class="text-6xl font-bold neon-red">—</div>
      <div id="risk-level" class="text-xl text-gray-200 mt-2">—</div>
      <div class="mt-4 text-sm text-gray-400" id="risk-contrib">Contributors loading...</div>
    </div>
  </div>
</div>

{% endblock %}
