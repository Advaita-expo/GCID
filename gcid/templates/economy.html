{% extends 'base.html' %}

{% block content %}
<div class="grid grid-cols-12 gap-6">
  <div class="col-span-8">
    <div class="glass-card p-4">
      <div class="flex items-center justify-between">
        <h3 class="text-lg font-semibold neon-blue">Economic Charts</h3>
        <div id="debug-info" class="text-xs text-yellow-300">Debug: initializing…</div>
      </div>
      <div class="mt-4 grid grid-cols-2 gap-4">
        <div class="p-3 bg-transparent rounded-md">
          <canvas id="oilChart" height="200"></canvas>
        </div>
        <div class="p-3 bg-transparent rounded-md">
          <canvas id="goldChart" height="200"></canvas>
        </div>
        <div class="p-3 bg-transparent rounded-md">
          <canvas id="forexChart" height="200"></canvas>
        </div>
        <div class="p-3 bg-transparent rounded-md">
          <canvas id="btcChart" height="200"></canvas>
        </div>
      </div>
    </div>
  </div>
  <div class="col-span-4">
    <div class="glass-card p-4">
      <h4 class="text-md font-semibold neon-purple">Market Summary</h4>
      <div id="market-summary" class="mt-3 text-sm text-gray-200">Loading...</div>
    </div>
  </div>
</div>
{% endblock %}
